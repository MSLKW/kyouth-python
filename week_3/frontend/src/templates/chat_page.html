<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Resume Helper Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<script src="chat_page.js" defer></script>
</head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
	<div class="d-flex flex-column justify-content-center align-items-center vh-100">
		<div id="chat-box" class="d-flex flex-column w-50 bg-light border rounded-3 overflow-auto" style="height: 30vh;"></div>
		<div id="input-box" class="w-50 border m-2 p-1 input-group rounded-3">
			<input type="file" class="visually-hidden" id="file-upload">
			<label for="file-upload" class="form-control m-1 btn btn-primary rounded-3" style="max-width: 50px; max-height: 50px; display: inline-block;">
				<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-upload" viewBox="0 0 16 16">
				<path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/>
				<path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708z"/>
				</svg>
			</label>
			<input type="text" id="text-input" class="w-50 form-control border-0 shadow-none rounded-3" name="text-input" placeholder="Type a message...">
			<button type="button" id="send-button" class="form-control m-1 btn btn-primary rounded-3">Send</button>
		</div>
	</div>
  </body>
</html>
